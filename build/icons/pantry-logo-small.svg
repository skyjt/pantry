<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <title>茶话间彩色小 logo</title>
  <!-- 两缕蒸汽 -->
  <path d="M24 16.5c-2.6-2.7-2.6-5.4 0-8.1" stroke="#8FC1AB" stroke-width="3" stroke-linecap="round" />
  <path d="M32.5 16.5c-2.6-2.7-2.6-5.4 0-8.1" stroke="#8FC1AB" stroke-width="3" stroke-linecap="round" />
  <!-- 杯把 -->
  <path d="M42 30h4.6a6.7 6.7 0 0 1 0 13.4H43.5" stroke="#3D8B6B" stroke-width="3.8" stroke-linecap="round" />
  <!-- 对话气泡尾（底部偏左尖角，根部嵌入杯身融合） -->
  <path d="M22 43.5 L17 53 L31 46 Z" fill="#3D8B6B" />
  <!-- 杯身（饱满圆角茶杯 = 对话气泡） -->
  <rect x="13" y="20" width="30" height="26" rx="10" fill="#3D8B6B" />
  <!-- 茶汤面 -->
  <ellipse cx="28" cy="28" rx="12" ry="3.2" fill="#F2C56B" />
</svg>
